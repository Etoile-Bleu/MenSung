name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release -- e.g. 0.1.0 (no v prefix)'
        required: true
        type: string

jobs:
  prepare:
    name: Bump version and tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate version format
        run: |
          if ! echo "${{ inputs.version }}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Bad version '${{ inputs.version }}' -- must be MAJOR.MINOR.PATCH"
            exit 1
          fi

      - uses: dtolnay/rust-toolchain@stable

      - name: Bump version in Cargo.toml
        run: |
          sed -i -E 's/^version = "[0-9]+\.[0-9]+\.[0-9]+"$/version = "${{ inputs.version }}"/' Cargo.toml
          grep -E '^version = "${{ inputs.version }}"' Cargo.toml || {
            echo "::error::Version replacement failed"
            exit 1
          }

      - name: Regenerate Cargo.lock
        run: cargo generate-lockfile

      - name: Commit and push version bump branch
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock
          # No-op if the version was already bumped (re-run on the same version)
          git diff --cached --quiet || git commit -m "chore: release v${{ inputs.version }}"
          # Push to a side branch -- branch protection blocks a direct push to
          # main without passing CI. The tag below is what actually drives
          # the release; the PR just keeps main's Cargo.toml in sync.
          git push origin HEAD:chore/bump-v${{ inputs.version }} --force

      - name: Open version bump PR
        run: |
          gh pr create \
            --title "chore: release v${{ inputs.version }}" \
            --body "Automated version bump. Merge after CI passes." \
            --base main \
            --head chore/bump-v${{ inputs.version }} \
          || echo "PR already open -- skipping"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push tag
        run: |
          git tag "v${{ inputs.version }}"
          git push origin "v${{ inputs.version }}"

      - name: Trigger build-release.yml on tag
        run: |
          gh workflow run build-release.yml --ref "v${{ inputs.version }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

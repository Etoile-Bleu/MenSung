name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact: mensung-linux-x86_64
            binary: mensung
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: mensung-windows-x86_64
            binary: mensung.exe
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: mensung-macos-x86_64
            binary: mensung

    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p mensung-client

      - name: Stage artifact
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "dist/${{ matrix.artifact }}$([ "${{ matrix.binary }}" = "mensung.exe" ] && echo .exe)"

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: dist/
          if-no-files-found: error

  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v8
        with:
          path: dist/

      - name: Collect binaries and generate checksums
        run: |
          mkdir -p release
          cp dist/mensung-linux-x86_64/mensung-linux-x86_64 release/
          cp dist/mensung-windows-x86_64/mensung-windows-x86_64.exe release/
          cp dist/mensung-macos-x86_64/mensung-macos-x86_64 release/
          cd release
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - uses: softprops/action-gh-release@v3
        with:
          name: "MenSung ${{ github.ref_name }}"
          generate_release_notes: true
          files: |
            release/*
          fail_on_unmatched_files: true

name: Build Release

on:
  push:
    tags:
      - 'v*'
  # Called explicitly by release.yml after pushing the tag. GITHUB_TOKEN
  # cannot trigger cross-workflow events, so release.yml dispatches us with
  # --ref "vX.Y.Z" on the tag ref instead.
  workflow_dispatch:
    inputs:
      version:
        description: 'Tag to release, e.g. v0.1.0 (leave empty when run on a tag ref)'
        required: false
        type: string

env:
  CARGO_TERM_COLOR: always
  RELEASE_TAG: ${{ inputs.version != '' && (startsWith(inputs.version, 'v') && inputs.version || format('v{0}', inputs.version)) || github.ref_name }}

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact: mensung-linux-x86_64
            binary: mensung

          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: mensung-windows-x86_64
            binary: mensung.exe

          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: mensung-macos-x86_64
            binary: mensung

    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ env.RELEASE_TAG }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p mensung-client

      - name: Stage artifact
        shell: bash
        run: |
          mkdir -p dist
          src="target/${{ matrix.target }}/release/${{ matrix.binary }}"
          dst="dist/${{ matrix.artifact }}"
          cp "$src" "$dst"
          if [[ "${{ matrix.target }}" == *windows* ]]; then
            mv "$dst" "${dst}.exe"
          fi

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: dist/
          if-no-files-found: error

  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0

      - uses: actions/download-artifact@v8
        with:
          path: dist/

      - name: Collect binaries and generate checksums
        run: |
          mkdir -p release
          cp dist/mensung-linux-x86_64/mensung-linux-x86_64 release/
          cp dist/mensung-windows-x86_64/mensung-windows-x86_64.exe release/
          cp dist/mensung-macos-x86_64/mensung-macos-x86_64 release/
          cd release
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Build release body
        run: |
          REPO="${{ github.repository }}"
          TAG="${{ env.RELEASE_TAG }}"

          cat > /tmp/release_body.md << EOF
          Offline medication interaction checker for humanitarian medical workers.

          This release ships the bootstrap seed dataset (five drugs, three
          textbook interactions), not the full DDInter dataset yet.
          See MEDICAL_DATA_POLICY.md and ROADMAP.md Phase 11.

          ### Install

          \`\`\`bash
          # Linux x86_64
          curl -fsSL -o mensung https://github.com/${REPO}/releases/download/${TAG}/mensung-linux-x86_64
          chmod +x mensung && sudo mv mensung /usr/local/bin/

          # macOS x86_64
          curl -fsSL -o mensung https://github.com/${REPO}/releases/download/${TAG}/mensung-macos-x86_64
          chmod +x mensung && sudo mv mensung /usr/local/bin/

          # Windows (PowerShell)
          Invoke-WebRequest -Uri "https://github.com/${REPO}/releases/download/${TAG}/mensung-windows-x86_64.exe" -OutFile mensung.exe
          \`\`\`

          ### Verify checksums

          \`\`\`bash
          sha256sum -c SHA256SUMS.txt
          \`\`\`

          EOF

          gh api repos/${REPO}/releases/generate-notes \
            -f tag_name="${TAG}" \
            --jq '.body' >> /tmp/release_body.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: "MenSung ${{ env.RELEASE_TAG }}"
          body_path: /tmp/release_body.md
          files: |
            release/*
          fail_on_unmatched_files: true

  smoke-test:
    name: Smoke test (linux x86_64)
    runs-on: ubuntu-latest
    needs: github-release

    steps:
      - name: Download linux binary
        uses: actions/download-artifact@v8
        with:
          name: mensung-linux-x86_64
          path: bin/

      - name: Binary smoke test
        run: |
          chmod +x bin/mensung-linux-x86_64

          set +e
          bin/mensung-linux-x86_64 Aspirin Warfarin > known.txt
          set -e
          grep -q "CONTRAINDICATED" known.txt || { echo "expected CONTRAINDICATED"; cat known.txt; exit 1; }
          echo "known interaction: OK"

          bin/mensung-linux-x86_64 Paracetamol Amoxicillin > unknown.txt
          grep -q "No known interaction" unknown.txt || { echo "expected no interaction"; cat unknown.txt; exit 1; }
          echo "no interaction: OK"

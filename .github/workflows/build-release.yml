name: Build Release

on:
  push:
    tags:
      - 'v*'
  # Called explicitly by release.yml after pushing the tag. GITHUB_TOKEN
  # cannot trigger cross-workflow events, so release.yml dispatches us with
  # --ref "vX.Y.Z" on the tag ref instead.
  workflow_dispatch:
    inputs:
      version:
        description: 'Tag to release, e.g. v0.1.0 (leave empty when run on a tag ref)'
        required: false
        type: string

env:
  CARGO_TERM_COLOR: always
  RELEASE_TAG: ${{ inputs.version != '' && (startsWith(inputs.version, 'v') && inputs.version || format('v{0}', inputs.version)) || github.ref_name }}

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact: mensung-linux-x86_64
            binary: mensung

          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: mensung-windows-x86_64
            binary: mensung.exe

          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: mensung-macos-x86_64
            binary: mensung

    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ env.RELEASE_TAG }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p mensung-client

      - name: Stage artifact
        shell: bash
        run: |
          mkdir -p dist
          src="target/${{ matrix.target }}/release/${{ matrix.binary }}"
          dst="dist/${{ matrix.artifact }}"
          cp "$src" "$dst"
          if [[ "${{ matrix.target }}" == *windows* ]]; then
            mv "$dst" "${dst}.exe"
          fi

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: dist/
          if-no-files-found: error

  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0

      - uses: actions/download-artifact@v8
        with:
          path: dist/

      - name: Collect binaries and generate checksums
        run: |
          mkdir -p release
          cp dist/mensung-linux-x86_64/mensung-linux-x86_64 release/
          cp dist/mensung-windows-x86_64/mensung-windows-x86_64.exe release/
          cp dist/mensung-macos-x86_64/mensung-macos-x86_64 release/
          cd release
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Build release body
        run: |
          REPO="${{ github.repository }}"
          TAG="${{ env.RELEASE_TAG }}"

          cat > /tmp/release_body.md << EOF
          Offline medication interaction checker for humanitarian medical workers.

          No dataset is embedded in this binary. Run it and it offers to
          install DDInter's dataset (CC BY-NC-SA 4.0) the first time, or
          place a pre-built medical_database.men next to it yourself.
          See MEDICAL_DATA_POLICY.md and the Usage section of README.md.

          ### Download

          \`\`\`bash
          # Linux x86_64
          curl -fsSL -o mensung https://github.com/${REPO}/releases/download/${TAG}/mensung-linux-x86_64
          chmod +x mensung

          # macOS x86_64
          curl -fsSL -o mensung https://github.com/${REPO}/releases/download/${TAG}/mensung-macos-x86_64
          chmod +x mensung

          # Windows (PowerShell)
          Invoke-WebRequest -Uri "https://github.com/${REPO}/releases/download/${TAG}/mensung-windows-x86_64.exe" -OutFile mensung.exe
          \`\`\`

          Run it from wherever you put it; \`medical_database.men\` is
          created right next to it on first run. Move both files together
          if you relocate it, or set \`MENSUNG_DATA_DIR\` to keep the
          database somewhere else.

          ### Verify checksums

          \`\`\`bash
          sha256sum -c SHA256SUMS.txt
          \`\`\`

          EOF

          gh api repos/${REPO}/releases/generate-notes \
            -f tag_name="${TAG}" \
            --jq '.body' >> /tmp/release_body.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: "MenSung ${{ env.RELEASE_TAG }}"
          body_path: /tmp/release_body.md
          files: |
            release/*
          fail_on_unmatched_files: true

  smoke-test:
    name: Smoke test (linux x86_64)
    runs-on: ubuntu-latest
    needs: github-release

    steps:
      - name: Download linux binary
        uses: actions/download-artifact@v8
        with:
          name: mensung-linux-x86_64
          path: bin/

      - name: Binary smoke test
        run: |
          chmod +x bin/mensung-linux-x86_64

          # No dataset is installed in this fresh CI environment. The
          # binary must refuse to guess and exit cleanly rather than crash
          # or hang; that refusal is itself the property this test checks.
          # It deliberately does not depend on a live network install,
          # which would make a release gate flaky against a third-party
          # site's uptime.
          set +e
          MENSUNG_DOWNLOAD_DATASET=0 bin/mensung-linux-x86_64 Aspirin Warfarin < /dev/null > out.txt 2>&1
          status=$?
          set -e
          [ "$status" -eq 70 ] || { echo "expected exit code 70, got $status"; cat out.txt; exit 1; }
          grep -q "No medication database found" out.txt || { echo "expected a clear missing-database message"; cat out.txt; exit 1; }
          echo "graceful no-database refusal: OK"

name: CI

on:
  push:
    branches: ["main", "feat/**", "fix/**", "refactor/**", "chore/**", "docs/**", "ci/**"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            rust:
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'deny.toml'
              - '.github/workflows/ci.yml'

  ci:
    name: CI (${{ matrix.target }})
    needs: changes
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: x86_64-apple-darwin
            os: macos-latest

    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        if: needs.changes.outputs.rust == 'true'
        with:
          targets: ${{ matrix.target }}
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        if: needs.changes.outputs.rust == 'true'
        with:
          key: ${{ matrix.target }}

      - name: Install musl tools
        if: needs.changes.outputs.rust == 'true' && matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Format
        if: needs.changes.outputs.rust == 'true'
        run: cargo fmt --check

      - name: Clippy
        if: needs.changes.outputs.rust == 'true'
        run: cargo clippy --workspace --all-targets --target ${{ matrix.target }} -- -D warnings

      - name: Tests
        if: needs.changes.outputs.rust == 'true'
        run: cargo test --workspace --target ${{ matrix.target }}

      - name: Build (release)
        if: needs.changes.outputs.rust == 'true'
        run: cargo build --release --workspace --target ${{ matrix.target }}

  audit:
    name: Security audit
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: rustsec/audit-check@v2
        if: needs.changes.outputs.rust == 'true'
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  deny:
    name: cargo-deny
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: EmbarkStudios/cargo-deny-action@v2
        if: needs.changes.outputs.rust == 'true'
